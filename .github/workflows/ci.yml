name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pillow scikit-learn pytest hydra-core mlflow sqlalchemy albumentations opencv-python-headless

      - name: Run fast tests
        run: |
                - name: Run CI-safe unit tests
        run: |
              pytest tests/test_model_utils.py tests/test_evaluator.py tests/test_mlflow.py -v
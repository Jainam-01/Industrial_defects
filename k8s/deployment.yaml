apiVersion: apps/v1
kind: Deployment
metadata:
  name: industrial-defect-api
  labels:
    app: industrial-defect-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: industrial-defect-api

  template:
    metadata:
      labels:
        app: industrial-defect-api

    spec:
      containers:
        - name: industrial-defect-api
          image: industrial-defect-api:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20